<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI 計算機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 隱藏數字輸入框的上下箭頭 */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
        
        /* 簡單的進場動畫 */
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans text-slate-800">

    <div class="bg-white rounded-3xl shadow-xl w-full max-w-md overflow-hidden border border-slate-100">
        <!-- 頂部裝飾區塊 -->
        <div class="bg-gradient-to-r from-blue-500 to-indigo-600 p-6 text-white text-center">
            <h1 class="text-3xl font-bold tracking-tight mb-2">BMI 計算機</h1>
            <p class="text-blue-100 text-sm">了解您的身體質量指數，邁向健康生活</p>
        </div>

        <div class="p-6 md:p-8 space-y-6">
            <!-- 輸入區 -->
            <div class="space-y-4">
                <!-- 性別選擇 -->
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-2">性別</label>
                    <div class="flex gap-4">
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="gender" value="male" class="peer sr-only" checked>
                            <div class="text-center p-3 rounded-xl border border-slate-200 bg-slate-50 peer-checked:bg-blue-50 peer-checked:border-blue-500 peer-checked:text-blue-700 transition-all shadow-sm">
                                👨 男性
                            </div>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="gender" value="female" class="peer sr-only">
                            <div class="text-center p-3 rounded-xl border border-slate-200 bg-slate-50 peer-checked:bg-pink-50 peer-checked:border-pink-500 peer-checked:text-pink-700 transition-all shadow-sm">
                                👩 女性
                            </div>
                        </label>
                    </div>
                </div>

                <!-- 年齡輸入 -->
                <div>
                    <label for="age" class="block text-sm font-medium text-slate-600 mb-1">年齡 (歲)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                <circle cx="12" cy="7" r="4" />
                            </svg>
                        </div>
                        <input type="number" id="age" placeholder="例如：25" 
                            class="pl-10 w-full bg-slate-50 border border-slate-200 text-slate-900 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3 transition-colors outline-none" required>
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                            <span class="text-slate-400 text-sm">歲</span>
                        </div>
                    </div>
                </div>

                <!-- 身高輸入 -->
                <div>
                    <label for="height" class="block text-sm font-medium text-slate-600 mb-1">身高 (公分)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M8 2v20" />
                                <path d="M8 6h4" />
                                <path d="M8 12h4" />
                                <path d="M8 18h4" />
                                <circle cx="16" cy="12" r="2" />
                            </svg>
                        </div>
                        <input type="number" id="height" placeholder="例如：170" 
                            class="pl-10 w-full bg-slate-50 border border-slate-200 text-slate-900 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3 transition-colors outline-none" required>
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                            <span class="text-slate-400 text-sm">cm</span>
                        </div>
                    </div>
                </div>

                <!-- 體重輸入 -->
                <div>
                    <label for="weight" class="block text-sm font-medium text-slate-600 mb-1">體重 (公斤)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z" />
                                <line x1="7" y1="7" x2="7.01" y2="7" />
                            </svg>
                        </div>
                        <input type="number" id="weight" placeholder="例如：65" 
                            class="pl-10 w-full bg-slate-50 border border-slate-200 text-slate-900 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3 transition-colors outline-none" required>
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                            <span class="text-slate-400 text-sm">kg</span>
                        </div>
                    </div>
                </div>

                <!-- 活動量選擇 (用於計算 TDEE) -->
                <div>
                    <label for="activity" class="block text-sm font-medium text-slate-600 mb-1">日常活動量</label>
                    <div class="relative">
                        <select id="activity" class="w-full bg-slate-50 border border-slate-200 text-slate-900 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3 appearance-none outline-none transition-colors shadow-sm cursor-pointer">
                            <option value="1.2">幾乎不動 (辦公室工作、不運動)</option>
                            <option value="1.375">輕度活動 (每週運動 1-3 天)</option>
                            <option value="1.55">中度活動 (每週運動 3-5 天)</option>
                            <option value="1.725">高度活動 (每週運動 6-7 天)</option>
                            <option value="1.9">極度活動 (體力勞動、每天高強度訓練)</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 錯誤提示訊息 -->
            <div id="error-msg" class="hidden text-red-500 text-sm text-center bg-red-50 p-2 rounded-lg">
                請輸入有效的年齡、身高與體重數值！
            </div>

            <!-- 計算按鈕 -->
            <button onclick="calculateBMI()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 px-4 rounded-xl shadow-md hover:shadow-lg transition-all duration-200 active:transform active:scale-95 flex justify-center items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/></svg>
                開始計算
            </button>

            <!-- 結果顯示區 (預設隱藏) -->
            <div id="result-container" class="hidden pt-4 border-t border-slate-100 fade-in">
                <h3 class="text-center text-slate-500 text-sm font-medium mb-2">您的計算結果</h3>
                
                <div class="flex flex-col items-center justify-center p-4 rounded-2xl bg-slate-50 border border-slate-100">
                    <div class="flex items-end gap-1 mb-1">
                        <span id="bmi-value" class="text-4xl font-black text-slate-800 tracking-tight">22.5</span>
                        <span class="text-slate-500 font-medium pb-1">BMI</span>
                    </div>
                    
                    <div id="bmi-status-badge" class="mt-2 px-4 py-1.5 rounded-full text-sm font-bold shadow-sm">
                        正常範圍
                    </div>
                </div>

                <!-- 健康體重範圍 -->
                <div class="mt-4 bg-white rounded-xl p-3 border border-slate-100 shadow-sm flex items-center justify-between">
                    <span class="text-sm text-slate-500 flex items-center gap-1.5">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-emerald-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                        您的健康體重範圍
                    </span>
                    <span id="ideal-weight-range" class="text-sm font-bold text-slate-700">
                        -- ~ -- kg
                    </span>
                </div>

                <!-- BMR & TDEE 資訊卡 -->
                <div class="mt-3 grid grid-cols-2 gap-3">
                    <div class="bg-indigo-50 rounded-xl p-3 border border-indigo-100 shadow-sm text-center">
                        <div class="text-xs text-indigo-600 font-medium mb-1">基礎代謝率 (BMR)</div>
                        <div class="flex items-end justify-center gap-1">
                            <span id="bmr-value" class="text-xl font-bold text-indigo-900 tracking-tight">--</span>
                            <span class="text-[10px] text-indigo-500 mb-1">大卡</span>
                        </div>
                    </div>
                    <div class="bg-orange-50 rounded-xl p-3 border border-orange-100 shadow-sm text-center">
                        <div class="text-xs text-orange-600 font-medium mb-1">每日總熱量 (TDEE)</div>
                        <div class="flex items-end justify-center gap-1">
                            <span id="tdee-value" class="text-xl font-bold text-orange-900 tracking-tight">--</span>
                            <span class="text-[10px] text-orange-500 mb-1">大卡</span>
                        </div>
                    </div>
                </div>

                <!-- 建議文字 -->
                <p id="bmi-advice" class="text-center text-sm text-slate-600 mt-4 px-2 leading-relaxed">
                    繼續保持良好的飲食與運動習慣！
                </p>
            </div>
        </div>
        
        <!-- BMI 標準對照表 -->
        <div class="bg-slate-50 p-5 md:p-6 border-t border-slate-100">
            <h4 class="text-sm font-bold text-slate-700 mb-3 flex items-center justify-center gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                成人 BMI 標準對照表
            </h4>
            <div class="rounded-lg overflow-hidden border border-slate-200 text-xs shadow-sm">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-px bg-slate-200">
                    <div class="bg-white p-2.5 flex justify-between items-center"><span class="text-blue-600 font-medium">體重過輕</span> <span class="text-slate-500 font-mono">&lt; 18.5</span></div>
                    <div class="bg-white p-2.5 flex justify-between items-center"><span class="text-green-600 font-bold">正常範圍</span> <span class="text-slate-700 font-mono font-bold">18.5 ~ 23.9</span></div>
                    <div class="bg-white p-2.5 flex justify-between items-center"><span class="text-yellow-600 font-medium">過重</span> <span class="text-slate-500 font-mono">24.0 ~ 26.9</span></div>
                    <div class="bg-white p-2.5 flex justify-between items-center"><span class="text-orange-500 font-medium">輕度肥胖</span> <span class="text-slate-500 font-mono">27.0 ~ 29.9</span></div>
                    <div class="bg-white p-2.5 flex justify-between items-center"><span class="text-red-500 font-medium">中度肥胖</span> <span class="text-slate-500 font-mono">30.0 ~ 34.9</span></div>
                    <div class="bg-white p-2.5 flex justify-between items-center"><span class="text-red-700 font-medium">重度肥胖</span> <span class="text-slate-500 font-mono">≥ 35.0</span></div>
                </div>
            </div>
            <div class="text-[11px] text-slate-400 mt-3 text-center">
                標準來源：衛生福利部國民健康署
            </div>
        </div>
    </div>

    <script>
        function calculateBMI() {
            // 取得輸入值
            const gender = document.querySelector('input[name="gender"]:checked').value;
            const ageInput = document.getElementById('age').value;
            const heightInput = document.getElementById('height').value;
            const weightInput = document.getElementById('weight').value;
            const activityLevel = parseFloat(document.getElementById('activity').value);
            const errorMsg = document.getElementById('error-msg');
            const resultContainer = document.getElementById('result-container');
            
            // 轉換為數字
            const age = parseInt(ageInput);
            const heightCm = parseFloat(heightInput);
            const weightKg = parseFloat(weightInput);

            // 驗證輸入
            if (isNaN(age) || isNaN(heightCm) || isNaN(weightKg) || age <= 0 || heightCm <= 0 || weightKg <= 0) {
                errorMsg.classList.remove('hidden');
                resultContainer.classList.add('hidden');
                return;
            }

            // 隱藏錯誤訊息
            errorMsg.classList.add('hidden');

            // 計算 BMI (體重(公斤) / 身高(公尺)的平方)
            const heightM = heightCm / 100;
            const bmi = weightKg / (heightM * heightM);
            const roundedBMI = bmi.toFixed(2); // 取到小數點後兩位

            // 計算健康體重範圍 (以 BMI 18.5 ~ 24 反推)
            const minWeight = (18.5 * heightM * heightM).toFixed(1);
            const maxWeight
